<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resultados y próximos partidos de fútbol en tiempo real.">
    <meta name="theme-color" content="#07080F">
    <title>Fútbol Live</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
/* ── Reset & Base ────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg:        #07080F;
    --surface:   #0E1018;
    --card:      #131720;
    --card-hov:  #181D2A;
    --border:    rgba(255,255,255,.07);
    --border-hi: rgba(255,255,255,.12);

    --live:      #4ADE80;
    --live-dim:  rgba(74,222,128,.12);
    --upcoming:  #60A5FA;
    --upcoming-dim: rgba(96,165,250,.1);

    --text:      #F1F2F5;
    --text-2:    #868B99;
    --text-3:    #454A58;

    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --r-card: 16px;
    --r-sm:   8px;
}

html { -webkit-tap-highlight-color: transparent; }

body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100svh;
    overscroll-behavior: none;
}

/* ── App Shell ───────────────────────────────── */
.app {
    max-width: 700px;
    margin: 0 auto;
    padding-bottom: 40px;
}

/* ── Header ──────────────────────────────────── */
.header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(7,8,15,.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
}

.header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 10px var(--live);
    animation: breathe 3s ease-in-out infinite;
}

@keyframes breathe {
    0%,100% { box-shadow: 0 0 6px var(--live); opacity:.9; }
    50%      { box-shadow: 0 0 16px var(--live); opacity:1; }
}

.brand-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -.3px;
    color: var(--text);
}

.header-right {
    display: flex;
    align-items: center;
    gap: 6px;
}

.last-updated {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    margin-right: 4px;
    font-variant-numeric: tabular-nums;
}

.icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
}

.icon-btn:hover {
    background: var(--card-hov);
    color: var(--text);
    border-color: var(--border-hi);
}

.icon-btn.spinning svg {
    animation: spin .6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Tabs ────────────────────────────────────── */
.tabs {
    display: flex;
    gap: 4px;
    padding: 12px 20px;
    position: sticky;
    top: 65px;
    z-index: 40;
    background: rgba(7,8,15,.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}

.tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-2);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
    letter-spacing: -.1px;
}

.tab:hover:not(.active) {
    background: var(--card);
    color: var(--text);
}

.tab.active {
    background: var(--card);
    color: var(--text);
    border-color: var(--border-hi);
}

.tab-live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--live);
    flex-shrink: 0;
    animation: pulse-dot 1.8s ease-in-out infinite;
}

.tab:not(.active) .tab-live-dot { opacity: .4; animation: none; }

@keyframes pulse-dot {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.35); opacity: .7; }
}

.tab-count {
    font-size: 11px;
    font-weight: 700;
    background: var(--border-hi);
    padding: 2px 7px;
    border-radius: 999px;
    min-width: 22px;
    text-align: center;
    font-variant-numeric: tabular-nums;
}

.tab.active .tab-count { background: rgba(255,255,255,.1); }

/* ── Content ─────────────────────────────────── */
.content { padding: 0 14px; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Matches List ────────────────────────────── */
.matches-list { display: flex; flex-direction: column; gap: 8px; padding-top: 6px; }

/* ── League Group ────────────────────────────── */
.league-group { margin-top: 10px; }

.league-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 6px 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: var(--text-2);
}

.league-group-header .flag {
    font-size: 22px;
    line-height: 1;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.4));
}

/* ── Match Card ──────────────────────────────── */
.match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    cursor: default;
    transition: background .18s, border-color .18s, transform .18s;
    position: relative;
    overflow: hidden;
}

.match-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    border-radius: 3px 0 0 3px;
}

.match-card.live::before   { background: var(--live); }
.match-card.upcoming::before { background: var(--upcoming); }

.match-card:hover {
    background: var(--card-hov);
    border-color: var(--border-hi);
    transform: translateY(-1px);
}

/* Status strip at top */
.card-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: flex-end;
    padding: 8px 12px 0;
}

/* ── Team Column ─────────────────────────────── */
.team-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
    padding-top: 10px;
}

.team-logo-wrap {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
}

.team-logo-wrap img {
    width: 38px;
    height: 38px;
    object-fit: contain;
    display: block;
}

.team-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-2);
    max-width: 110px;
    line-height: 1.3;
    text-wrap: balance;
}

/* ── Score Center ────────────────────────────── */
.score-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 80px;
}

.score-board {
    display: flex;
    align-items: center;
    gap: 2px;
}

.score-num {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    line-height: 1;
    min-width: 28px;
    text-align: center;
}

.score-sep {
    font-size: 22px;
    font-weight: 300;
    color: var(--text-3);
    margin: 0 2px;
    line-height: 1;
}

.match-card.live .score-num {
    color: var(--live);
}

.status-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
}

.status-pill.live {
    background: var(--live-dim);
    color: var(--live);
    display: flex;
    align-items: center;
    gap: 4px;
}

.status-pill.live::before {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse-dot 1.4s infinite;
    flex-shrink: 0;
}

.status-pill.upcoming {
    background: var(--upcoming-dim);
    color: var(--upcoming);
}

.match-time {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-3);
    text-align: center;
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
}

/* ── Empty State ─────────────────────────────── */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 10px;
    color: var(--text-3);
    text-align: center;
}

.empty-icon-wrap {
    width: 60px;
    height: 60px;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 4px;
}

.empty-state h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-2);
}

.empty-state p {
    font-size: 13px;
    color: var(--text-3);
}

/* ── Skeletons ───────────────────────────────── */
.skeleton-wrap { display: flex; flex-direction: column; gap: 8px; padding-top: 6px; }

.skeleton-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    height: 100px;
    animation: shimmer 1.4s ease-in-out infinite;
}

@keyframes shimmer {
    0%,100% { opacity: .5; }
    50%      { opacity: 1; }
}

/* ── Settings Modal ──────────────────────────── */
.modal {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
}

.modal.hidden { display: none; }

.modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}

.modal-sheet {
    position: relative;
    width: 100%;
    max-width: 700px;
    background: #111420;
    border-radius: 24px 24px 0 0;
    border: 1px solid var(--border-hi);
    border-bottom: none;
    padding: 12px 24px 40px;
    animation: slide-up .25s ease;
}

@keyframes slide-up {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
}

.modal-handle {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: var(--border-hi);
    margin: 0 auto 20px;
}

.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
}

.modal-header h3 {
    font-size: 17px;
    font-weight: 700;
}

.setting-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
}

.segment-control {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 20px;
}

.seg-btn {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--text-2);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
}

.seg-btn.active {
    background: var(--card-hov);
    color: var(--text);
    border: 1px solid var(--border-hi);
}

.info-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-3);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
}

.modal-footer {
    margin-top: 20px;
}

.btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--live);
    color: #021a0a;
    border: none;
    border-radius: 12px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
    letter-spacing: -.2px;
}

.btn-primary:hover { opacity: .88; }

/* ── Toast ───────────────────────────────────── */
.toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: #1C2030;
    border: 1px solid var(--border-hi);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    z-index: 300;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    max-width: calc(100vw - 40px);
    overflow: hidden;
    text-overflow: ellipsis;
    animation: toast-in .2s ease;
}

@keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.toast.hidden { display: none; }
.toast.success { border-color: rgba(74,222,128,.3); }
.toast.error   { border-color: rgba(248,113,113,.3); }

/* ── Responsive ──────────────────────────────── */
@media (max-width: 480px) {
    .content { padding: 0 10px; }
    .tabs { padding: 10px 14px; }
    .header-inner { padding: 12px 16px; }
    .team-logo-wrap { width: 42px; height: 42px; }
    .team-logo-wrap img { width: 32px; height: 32px; }
    .score-num { font-size: 28px; }
    .team-name { font-size: 11px; max-width: 90px; }
}

</style>

<body>
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="brand">
                    <div class="brand-dot"></div>
                    <span class="brand-name">Fútbol Live</span>

</button>
            </div>

        <!-- Tabs -->

    <script>
// ⚽ Fútbol Live PWA — ESPN API
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer';

const LEAGUES = [
    { slug: 'esp.1',          name: 'La Liga',              country: 'España',       flag: '🇪🇸' },
    { slug: 'eng.1',          name: 'Premier League',       country: 'Inglaterra',   flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
    { slug: 'ita.1',          name: 'Serie A',              country: 'Italia',       flag: '🇮🇹' },
    { slug: 'ger.1',          name: 'Bundesliga',           country: 'Alemania',     flag: '🇩🇪' },
    { slug: 'fra.1',          name: 'Ligue 1',              country: 'Francia',      flag: '🇫🇷' },
    { slug: 'den.1',          name: 'Danish Superliga',     country: 'Dinamarca',    flag: '🇩🇰' },
    { slug: 'ned.1',          name: 'Eredivisie',           country: 'Países Bajos', flag: '🇳🇱' },
    { slug: 'nor.1',          name: 'Eliteserien',          country: 'Noruega',      flag: '🇳🇴' },
    { slug: 'por.1',          name: 'Primeira Liga',        country: 'Portugal',     flag: '🇵🇹' },
    { slug: 'chi.1',          name: 'Primera División',     country: 'Chile',        flag: '🇨🇱' },
    { slug: 'bra.1',          name: 'Brasileirão',          country: 'Brasil',       flag: '🇧🇷' },
    { slug: 'uefa.champions', name: 'Champions League',     country: 'Europa',       flag: '🏆' },
];

let autoRefreshInterval = null;
let currentTab = 'live';

// DOM
const liveMatchesEl    = document.getElementById('live-matches');
const upcomingMatchesEl= document.getElementById('upcoming-matches');
const liveCountEl      = document.getElementById('live-count');
const upcomingCountEl  = document.getElementById('upcoming-count');
const lastUpdatedEl    = document.getElementById('last-updated');
const refreshBtn       = document.getElementById('refresh-btn');
const settingsBtn      = document.getElementById('settings-btn');
const settingsModal    = document.getElementById('settings-modal');
const toastEl          = document.getElementById('toast');

// ── Toast ────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    toastEl.textContent = msg;
    toastEl.className = `toast ${type}`;
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => toastEl.classList.add('hidden'), 2800);
}

// ── Formatters ───────────────────────────────────────────
function formatTime(utcDate) {
    return new Date(utcDate).toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function formatDate(utcDate) {
    const d = new Date(utcDate);
    const today    = new Date();
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    if (d.toDateString() === today.toDateString())    return 'Hoy · ' + formatTime(utcDate);
    if (d.toDateString() === tomorrow.toDateString()) return 'Mañana · ' + formatTime(utcDate);
    return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' }) + ' · ' + formatTime(utcDate);
}

// ── Fetch ────────────────────────────────────────────────
async function fetchAllLeagues() {
    return Promise.all(LEAGUES.map(async league => {
        try {
            const res = await fetch(`${ESPN_BASE}/${league.slug}/scoreboard`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return { league, data: await res.json() };
        } catch (e) {
            console.warn(`[${league.name}]`, e.message);
            return { league, data: null };
        }
    }));
}

function parseESPNMatches(leagueInfo, espnData) {
    if (!espnData?.events?.length) return [];
    const matches = [];
    espnData.events.forEach(event => {
        const comp   = event.competitions?.[0];
        if (!comp) return;
        const home   = comp.competitors?.find(c => c.homeAway === 'home') || comp.competitors?.[0];
        const away   = comp.competitors?.find(c => c.homeAway === 'away') || comp.competitors?.[1];
        if (!home || !away) return;
        const status = comp.status || event.status || {};
        const state  = status.state || status.type?.state || 'pre';
        const isLive = state === 'in' || status.type?.name === 'STATUS_IN_PROGRESS';
        if (state === 'post' || status.type?.name === 'STATUS_FINAL') return;
        matches.push({
            id: event.id,
            league: leagueInfo.name,
            country: leagueInfo.country,
            flag: leagueInfo.flag,
            homeTeam: {
                name: home.team?.shortDisplayName || home.team?.displayName || 'Local',
                logo: home.team?.logo || '',
                score: parseInt(home.score) || 0
            },
            awayTeam: {
                name: away.team?.shortDisplayName || away.team?.displayName || 'Visitante',
                logo: away.team?.logo || '',
                score: parseInt(away.score) || 0
            },
            state,
            minute: status.displayClock || status.clock || '0\'',
            utcDate: event.date || comp.date,
            isLive,
            isUpcoming: state === 'pre'
        });
    });
    return matches;
}

// ── Render ───────────────────────────────────────────────
function createMatchCard(match) {
    const card = document.createElement('div');
    card.className = `match-card ${match.isLive ? 'live' : 'upcoming'}`;

    const statusPill = match.isLive
        ? `<div class="status-pill live">${match.minute}</div>`
        : `<div class="status-pill upcoming">${formatDate(match.utcDate)}</div>`;

    const FALLBACK = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23131720'/%3E%3C/svg%3E`;

    card.innerHTML = `
        <div class="team-col">
            <div class="team-logo-wrap">
                <img src="${match.homeTeam.logo || FALLBACK}" alt="${match.homeTeam.name}" onerror="this.src='${FALLBACK}'">
            </div>
            <div class="team-name">${match.homeTeam.name}</div>
        </div>

        <div class="score-col">
            <div class="score-board">
                <span class="score-num">${match.isLive ? match.homeTeam.score : '—'}</span>
                <span class="score-sep">:</span>
                <span class="score-num">${match.isLive ? match.awayTeam.score : '—'}</span>
            </div>
            ${statusPill}
        </div>

        <div class="team-col">
            <div class="team-logo-wrap">
                <img src="${match.awayTeam.logo || FALLBACK}" alt="${match.awayTeam.name}" onerror="this.src='${FALLBACK}'">
            </div>
            <div class="team-name">${match.awayTeam.name}</div>
        </div>
    `;
    return card;
}

// Group matches by league and render
function renderMatches(container, matches, emptyMsg, emptyIcon = '⚽') {
    container.innerHTML = '';

    if (!matches.length) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon-wrap">${emptyIcon}</div>
                <h3>${emptyMsg}</h3>
                <p>Intenta actualizar en unos minutos.</p>
            </div>`;
        return;
    }

    // Agrupar por liga
    const groups = {};
    matches.forEach(m => {
        const key = m.league;
        if (!groups[key]) groups[key] = { meta: m, items: [] };
        groups[key].items.push(m);
    });

    Object.values(groups).forEach(({ meta, items }) => {
        const group = document.createElement('div');
        group.className = 'league-group';
        group.innerHTML = `
            <div class="league-group-header">
                <span class="flag">${meta.flag}</span>
                ${meta.league}
            </div>`;
        items.forEach(m => group.appendChild(createMatchCard(m)));
        container.appendChild(group);
    });
}

// ── Load Data ────────────────────────────────────────────
async function loadData() {
    // Skeleton already in HTML on first load; on refresh show mini skeletons
    if (liveMatchesEl.querySelector('.league-group, .empty-state')) {
        liveMatchesEl.innerHTML     = '<div class="skeleton-wrap"><div class="skeleton-card"></div><div class="skeleton-card"></div></div>';
        upcomingMatchesEl.innerHTML = '<div class="skeleton-wrap"><div class="skeleton-card"></div><div class="skeleton-card"></div></div>';
    }

    try {
        const results = await fetchAllLeagues();
        const allLive = [], allUpcoming = [];

        results.forEach(({ league, data }) => {
            if (!data) return;
            parseESPNMatches(league, data).forEach(m => {
                if (m.isLive)     allLive.push(m);
                else if (m.isUpcoming) allUpcoming.push(m);
            });
        });

        allLive.sort((a, b) => (parseInt(b.minute) || 0) - (parseInt(a.minute) || 0));
        allUpcoming.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

        liveCountEl.textContent     = allLive.length;
        upcomingCountEl.textContent = allUpcoming.length;

        renderMatches(liveMatchesEl,     allLive,              'No hay partidos en vivo', '⚽');
        renderMatches(upcomingMatchesEl, allUpcoming.slice(0, 50), 'No hay próximos partidos', '📅');

        const now = new Date();
        lastUpdatedEl.textContent = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

        showToast(`${allLive.length + allUpcoming.length} partidos · ESPN`);
    } catch (err) {
        console.error(err);
        [liveMatchesEl, upcomingMatchesEl].forEach(el => {
            el.innerHTML = `<div class="empty-state"><div class="empty-icon-wrap">⚠️</div><h3>Error de conexión</h3><p>${err.message}</p></div>`;
        });
        showToast('No se pudo conectar con ESPN', 'error');
    }
}

// ── Tabs ─────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
        currentTab = tab.dataset.tab;
    });
});

// ── Settings ─────────────────────────────────────────────
function setupSettings() {
    const saved = localStorage.getItem('auto_refresh_interval') || '45';
    document.querySelectorAll('.seg-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.val === saved);
        btn.addEventListener('click', () => {
            document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
    document.getElementById('close-settings').addEventListener('click', () => settingsModal.classList.add('hidden'));
    document.getElementById('close-settings-bg').addEventListener('click', () => settingsModal.classList.add('hidden'));

    document.getElementById('save-settings').addEventListener('click', () => {
        const val = document.querySelector('.seg-btn.active')?.dataset.val || '45';
        localStorage.setItem('auto_refresh_interval', val);
        setupAutoRefresh();
        settingsModal.classList.add('hidden');
        showToast('Configuración guardada');
        loadData();
    });
}

// ── Auto refresh ─────────────────────────────────────────
function setupAutoRefresh() {
    clearInterval(autoRefreshInterval);
    const secs = parseInt(localStorage.getItem('auto_refresh_interval') || '45');
    if (secs > 0) {
        autoRefreshInterval = setInterval(() => {
            if (!settingsModal.classList.contains('hidden')) return;
            loadData();
        }, secs * 1000);
    }
}

// ── Refresh button ────────────────────────────────────────
refreshBtn.addEventListener('click', () => {
    refreshBtn.classList.add('spinning');
    loadData().finally(() => refreshBtn.classList.remove('spinning'));
});

document.addEventListener('keydown', e => {
    if (e.key === 'r' && document.activeElement.tagName !== 'INPUT') loadData();
});

// ── Service Worker ────────────────────────────────────────
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}

// ── Init ──────────────────────────────────────────────────
setupSettings();
setupAutoRefresh();
loadData();
window.loadData = loadData;
<script>
// === INSTALAR APP COMO PWA ===
let deferredPrompt;
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex';   // Muestra el botón
});

installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    
    if (outcome === 'accepted') {
        installBtn.style.display = 'none';
    }
    deferredPrompt = null;
});

// Ocultar botón si ya está instalada
if (window.matchMedia('(display-mode: standalone)').matches) {
    installBtn.style.display = 'none';
}
</script>
</script>
