<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resultados y próximos partidos de fútbol en tiempo real.">
    <meta name="theme-color" content="#07080F">
    <title>Fútbol Live</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%234ade80'/%3E%3Ctext y='.9em' font-size='72' x='12'%3E⚽%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="brand">
                    <div class="brand-dot"></div>
                    <span class="brand-name">Fútbol Live</span>
                </div>
                <div class="header-right">
                    <div id="last-updated" class="last-updated">--:--</div>
                    <button id="refresh-btn" class="icon-btn" title="Actualizar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                    </button>
                    <button id="settings-btn" class="icon-btn" title="Configuración">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 1.41 14.43M4.93 4.93a10 10 0 0 0-1.41 14.43M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tabs">
            <button class="tab active" data-tab="live">
                <span class="tab-live-dot"></span>
                En Vivo
                <span class="tab-count" id="live-count">0</span>
            </button>
            <button class="tab" data-tab="upcoming">
                Próximos
                <span class="tab-count" id="upcoming-count">0</span>
            </button>
        </nav>

        <!-- Content -->
        <main class="content">

            <!-- Live Tab -->
            <div id="live-tab" class="tab-content active">
                <div id="live-matches" class="matches-list">
                    <div class="skeleton-wrap">
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                    </div>
                </div>
            </div>

            <!-- Upcoming Tab -->
            <div id="upcoming-tab" class="tab-content">
                <div id="upcoming-matches" class="matches-list">
                    <div class="skeleton-wrap">
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                    </div>
                </div>
            </div>

        </main>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-backdrop" id="close-settings-bg"></div>
            <div class="modal-sheet">
                <div class="modal-handle"></div>
                <div class="modal-header">
                    <h3>Configuración</h3>
                    <button class="icon-btn" id="close-settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <label class="setting-label">Actualización automática</label>
                    <div class="segment-control" id="refresh-segment">
                        <button class="seg-btn" data-val="0">Off</button>
                        <button class="seg-btn" data-val="30">30s</button>
                        <button class="seg-btn active" data-val="45">45s</button>
                        <button class="seg-btn" data-val="60">1m</button>
                        <button class="seg-btn" data-val="120">2m</button>
                    </div>
                    <div class="info-pill">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        Datos en tiempo real vía ESPN · 12 ligas
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-primary" id="save-settings">Guardar</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
